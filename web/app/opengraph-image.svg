  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Cosmic Hustle</text>
  <!-- subtitle -->
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#64748b">AI 에이전트 11명과 함께하는 우주 리서치 회사</text>
  <!-- agent count badge -->
  <rect x="480" y="548" width="240" height="40" rx="20" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="573" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a78bfa">Research · Creative · Operations</text>
  <defs>
    <radialGradient id="pg" cx="38%" cy="35%" r="65%">
